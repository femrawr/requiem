<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Requiem builder</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <div class="sidebar">
                <div class="tab-container">
                    <div class="tab-title">main</div>
                    <button class="tab-button active" data-tab="bot">bot</button>
                    <button class="tab-button" data-tab="setup">setup</button>
                    <button class="tab-button" data-tab="options">options</button>
                    <button class="tab-button" data-tab="persistence">persistence</button>

                    <div class="tab-divider"></div>

                    <div class="tab-title">generic</div>
                    <button class="tab-button" data-tab="site" style="background: var(--primary)">site settings</button>
                    <button class="tab-button" data-tab="build" style="background: var(--primary)">build settings</button>
                </div>

                <div style="flex: 1;"></div>

                <div class="actions">
                    <div class="build-tag">default</div>
                    <button class="build-button" id="build">build</button>
                </div>
            </div>

            <main class="main">
                <div class="panel">
                    <div class="content active" id="bot-tab"></div>
                    <div class="content" id="options-tab"></div>
                    <div class="content" id="setup-tab"></div>
                    <div class="content" id="persistence-tab"></div>

                    <div class="content" id="site-tab"></div>
                    <div class="content" id="build-tab"></div>
                </div>
            </main>
        </div>

        <div class="notifs"></div>
    </body>

    <script src="js/util-crypto.js"></script>
    <script src="js/util-saving.js"></script>
    <script src="js/ui-notifs.js"></script>

    <script>
        const TAG_NAME = 'req.tag';
        const CFG_NAME = 'req.cfg';
        const E2E_NAME = 'req.e2e';

        const NOTIF_SUCC = 'success';
        const NOTIF_INFO = 'info';
        const NOTIF_WARN = 'warning';
        const NOTIF_ERROR = 'error';

        const E2E_VERIFICATION_STRING = 'verify00?';

        let e2ePassword = undefined;

        const e2eVerification = localStorage.getItem(E2E_NAME);
        if (e2eVerification) {
            const password = prompt('Enter password to decrypt data');
            if (password === '') {
                alert('Password is empty.');
                location.reload();
            }

            e2ePassword = password;

            (async () => {
                await decryptData(e2eVerification, e2ePassword)
                    .catch((err) => {
                        alert('Password is invalid.');
                        location.reload();
                    });
            })();
        }

        (async () => {
            const fetched = await fetch('/api/get-version');
            const versions = await fetched.json();

            document.title += ' ' + versions.public + '.' + versions.server
        })();
    </script>

    <script src="js/ui-settings.js"></script>
    <script src="js/ui-tag.js"></script>
    <script src="js/main-build.js"></script>
</html>
